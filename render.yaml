databases:
  - name: juspay-dashboard-db
    databaseName: juspay_dashboard
    plan: free
    ipAllowList: []

services:
  - type: web
    name: juspay-merchant-dashboard
    runtime: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: juspay-dashboard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: ""
